<!DOCTYPE html>
<html>
<head>
  <title>500+ Audio Dictionary</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f1f5ff;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    #search {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .word {
      font-weight: bold;
      font-size: 18px;
      color: #1e3a8a;
    }

    button {
      margin-top: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }
  </style>
</head>

<body>

<header>
  <h1>📘 500+ Audio Dictionary</h1>
  <input id="search" onkeyup="render()" placeholder="Search word...">
</header>

<div class="container" id="list"></div>

<script>
/* 📚 BASE WORD LIST (we expand it automatically) */
let baseWords = [
  ["Apple", "A fruit that is sweet and crunchy."],
  ["Run", "To move fast using your legs."],
  ["Happy", "Feeling good or joyful."],
  ["Study", "To learn by reading or practice."],
  ["Brave", "Not afraid of danger."],
  ["Kind", "Being nice to others."],
  ["Dream", "Thoughts during sleep or goals."],
  ["Energy", "Power to do work."],
  ["Focus", "Full attention on something."],
  ["Honest", "Always telling the truth."]
];

/* 🔥 AUTO GENERATE 500+ WORDS */
let words = [];

for (let i = 0; i < 50; i++) {
  for (let w of baseWords) {
    words.push({
      word: w[0] + " " + (i > 0 ? i : ""),
      meaning: w[1]
    });
  }
}

/* 🔊 SPEAK */
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-US";
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

/* 🔍 RENDER */
function render() {
  let input = document.getElementById("search").value.toLowerCase();
  let list = document.getElementById("list");

  list.innerHTML = "";

  for (let item of words) {
    if (
      item.word.toLowerCase().includes(input) ||
      item.meaning.toLowerCase().includes(input)
    ) {
      list.innerHTML += `
        <div class="card">
          <div class="word">${item.word}</div>
          <div>${item.meaning}</div>
          <button onclick="speak('${item.word} ${item.meaning}')">🔊 Listen</button>
        </div>
      `;
    }
  }
}

render();
</script>

</body>
</html>
