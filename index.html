<!DOCTYPE html>
<html>
<head>
  <title>Dictionary Pro v4</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f1f5ff;
      transition: 0.3s;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    #search {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    button.small {
      padding: 6px 10px;
      font-size: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .word {
      font-size: 20px;
      font-weight: bold;
      color: #1e3a8a;
    }

    .type {
      font-size: 12px;
      color: gray;
    }

    .meaning {
      margin: 5px 0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    button:hover {
      background: #1e40af;
    }

    /* 🌙 DARK MODE */
    .dark {
      background: #111827;
      color: white;
    }

    .dark .card {
      background: #1f2937;
      color: white;
    }

    .dark .word {
      color: #60a5fa;
    }
  </style>
</head>

<body>

<header>
  <h1>📘 Dictionary Pro v4</h1>

  <input id="search" onkeyup="searchWord()" placeholder="Search word...">

  <div class="topbar">
    <button class="small" onclick="toggleDark()">🌙 Dark Mode</button>
  </div>
</header>

<div class="container" id="list">

  <!-- WORDS -->

  <div class="card">
    <div class="word">Apple</div>
    <div class="type">Noun</div>
    <div class="meaning">A fruit that is red, green, or yellow.</div>
    <button onclick="speak('Apple a fruit')">🔊</button>
    <button onclick="fav(this)">⭐</button>
  </div>

  <div class="card">
    <div class="word">Run</div>
    <div class="type">Verb</div>
    <div class="meaning">To move fast on foot.</div>
    <button onclick="speak('Run to move fast')">🔊</button>
    <button onclick="fav(this)">⭐</button>
  </div>

  <div class="card">
    <div class="word">Beautiful</div>
    <div class="type">Adjective</div>
    <div class="meaning">Very attractive or pleasing.</div>
    <button onclick="speak('Beautiful very attractive')">🔊</button>
    <button onclick="fav(this)">⭐</button>
  </div>

  <div class="card">
    <div class="word">Study</div>
    <div class="type">Verb</div>
    <div class="meaning">To learn by reading or practicing.</div>
    <button onclick="speak('Study to learn')">🔊</button>
    <button onclick="fav(this)">⭐</button>
  </div>

  <div class="card">
    <div class="word">Kind</div>
    <div class="type">Adjective</div>
    <div class="meaning">Being nice and helpful.</div>
    <button onclick="speak('Kind being nice')">🔊</button>
    <button onclick="fav(this)">⭐</button>
  </div>

</div>

<script>
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-US";
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function searchWord() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let card of cards) {
    let word = card.querySelector(".word").innerText.toLowerCase();
    let meaning = card.querySelector(".meaning").innerText.toLowerCase();

    if (word.includes(input) || meaning.includes(input)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  }
}

/* 🌙 DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* ⭐ FAVORITE */
function fav(btn) {
  btn.innerText = btn.innerText === "⭐" ? "❤️" : "⭐";
}
</script>

</body>
</html>
